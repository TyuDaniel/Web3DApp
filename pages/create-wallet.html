<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Wallet</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Create Wallet</h1>

      <button id="btn-generate" type="button">Generate Wallet</button>

      <div id="wallet-output" hidden>
        <div class="form-group">
          <label for="out-address">Address</label>
          <input id="out-address" type="text" readonly />
        </div>

        <div class="form-group">
          <label for="out-privkey">Private Key</label>
          <div class="input-row">
            <input id="out-privkey" type="password" readonly />
            <button id="btn-reveal" type="button">Show</button>
          </div>
        </div>

        <div class="warning-box">
          This is the only time you'll see the private key.
          Download the keystore before refreshing.
        </div>

        <div class="form-group">
          <label for="inp-password">Encryption Password (min 12 chars)</label>
          <input id="inp-password" type="password" autocomplete="new-password" />
        </div>

        <button id="btn-download" type="button" disabled>Download Keystore</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/create-wallet.js"></script>
</body>
</html>
